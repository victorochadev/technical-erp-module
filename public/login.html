<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entrar — Vegas ERP</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="login.css" />
<script>
  ;(function() {
    var saved = localStorage.getItem('at-theme') || 'light'
    document.documentElement.setAttribute('data-theme', saved)
  })()
</script>
</head>
<body>

<div class="card login-card">
  <div class="login-logo">
    <svg viewBox="0 0 24 24">
      <defs>
        <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#14b8a6"/>
          <stop offset="50%" stop-color="#6d5bd0"/>
          <stop offset="100%" stop-color="#e0607a"/>
        </linearGradient>
      </defs>
      <circle cx="12" cy="12" r="11" fill="url(#logoGrad)"/>
      <path d="M8 7v10M8 7c3 0 5 1.2 5 3s-2 3-5 3M8 13c3.5 0 6 1.3 6 3.5" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="login-title">Vegas ERP</div>
  <div class="login-subtitle">Entre com suas credenciais para acessar o protótipo</div>

  <form class="login-form" id="login-form">
    <div class="field">
      <label class="field-label" for="input-usuario">Usuário</label>
      <input type="text" class="field-input" id="input-usuario" autocomplete="username" autofocus />
    </div>
    <div class="field">
      <label class="field-label" for="input-senha">Senha</label>
      <input type="password" class="field-input" id="input-senha" autocomplete="current-password" />
    </div>
    <div class="login-error" id="login-error"></div>
    <button type="submit" class="btn btn--primary">Entrar</button>
  </form>
</div>

<script src="login.js"></script>
</body>
</html>
