<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - ERP Módulo Técnico</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="login.css" />
<script>
  ;(function() {
    var saved = localStorage.getItem('at-theme') || 'light'
    document.documentElement.setAttribute('data-theme', saved)
  })()
</script>
</head>
<body class="login-page">

<div class="login-split">
  <aside class="login-hero">
    <div class="login-hero__eyebrow">Módulo Técnico · Protótipo</div>
    <h1 class="login-hero__title">ERP Módulo Técnico</h1>
    <p class="login-hero__desc">Gestão de ordens de serviço, equipes e ativos técnicos em um único painel, do agendamento à conclusão.</p>
  </aside>

  <section class="login-panel">
    <div class="login-card">
      <h2 class="login-card__title">Bem-vindo de volta</h2>
      <p class="login-card__subtitle">Acesse com suas credenciais técnicas para continuar.</p>

      <form class="login-form" id="login-form">
        <div class="login-field">
          <label class="login-field__label" for="input-usuario">Usuário ou e-mail</label>
          <input type="text" class="login-field__input" id="input-usuario" placeholder="tecnico@empresa.com" autocomplete="username" autofocus />
        </div>
        <div class="login-field">
          <label class="login-field__label" for="input-senha">Senha</label>
          <input type="password" class="login-field__input" id="input-senha" placeholder="••••••••••" autocomplete="current-password" />
        </div>

        <div class="login-row">
          <label class="login-toggle">
            <input type="checkbox" id="input-manter-conectado" />
            <span class="login-toggle__track"><span class="login-toggle__thumb"></span></span>
            Manter conectado
          </label>
          <a href="#" class="login-link" id="link-esqueci-senha">Esqueceu a senha?</a>
        </div>

        <div class="login-error" id="login-error"></div>
        <button type="submit" class="login-submit">Entrar no sistema</button>
      </form>

      <p class="login-support">Problemas para acessar? Fale com o suporte de TI.</p>
    </div>
  </section>
</div>

<script src="login.js"></script>
</body>
</html>
